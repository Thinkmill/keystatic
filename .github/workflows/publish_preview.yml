name: Publish (Preview)
on:
  workflow_dispatch:
  pull_request:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main

      - uses: ./.github/actions/setup-deps

      - name: Build
        run: pnpm build:packages

      - run:
          pnpm dlx pkg-pr-new publish --comment=off './packages/*'
          './templates/*' './design-system/pkg'
